# Nginx locale redirects for Tikit SPA
# Include inside your `server { ... }` block.

# Auto-redirect root by browser language
map $http_accept_language $root_locale_by_header {
    default /en;
    ~*^ar /ar;
    ~*^fr /fr;
}

# Optional cookie override for root (preferred_locale=en|fr|ar)
map $http_cookie $root_locale_redirect {
    default $root_locale_by_header;
    ~*(?:^|;\s*)preferred_locale=ar(?:;|$) /ar;
    ~*(?:^|;\s*)preferred_locale=fr(?:;|$) /fr;
    ~*(?:^|;\s*)preferred_locale=en(?:;|$) /en;
}

location = / {
    return 302 $root_locale_redirect;
}

# Canonicalize any non-localized, extension-less route to /en/*
# Keep localized routes and static assets untouched.
location ~* ^/(?!en/|fr/|ar/)([^.?]+)$ {
    return 301 /en/$1$is_args$args;
}

# Typical SPA fallback (localized paths)
location / {
    try_files $uri $uri/ /index.html;
}
